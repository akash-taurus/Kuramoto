version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kuramoto_db
    restart: always
    environment:
      POSTGRES_USER: kuramoto
      POSTGRES_PASSWORD: development_password
      POSTGRES_DB: kuramoto_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuramoto -d kuramoto_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kuramoto_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  redisdata:
